<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AB Publisher LLC</title>

  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1a2e;
      --card:#0f1d35cc;
      --card2:#0c162a;
      --text:#eaf1ff;
      --muted:#b9c6e6;
      --line:#223255;
      --accent:#5eead4;
      --accent2:#60a5fa;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --max: 980px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(96,165,250,.25), transparent 55%),
        radial-gradient(900px 500px at 80% 20%, rgba(94,234,212,.18), transparent 55%),
        radial-gradient(900px 500px at 50% 90%, rgba(99,102,241,.14), transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      text-align:center;
    }

    a{ color: var(--accent2); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 44px 18px 60px;
    }

    /* Top Bar */
    .top{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom: 20px;
      opacity:.95;
    }
    .brandmark{
      width:44px; height:44px;
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(96,165,250,.95), rgba(94,234,212,.9));
      box-shadow: var(--shadow);
      display:grid;
      place-items:center;
    }
    .brandmark svg{ filter: drop-shadow(0 6px 10px rgba(0,0,0,.25)); }

    /* Hero */
    .hero{
      padding: 34px 18px 26px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(700px 220px at 50% 0%, rgba(94,234,212,.22), transparent 60%),
        radial-gradient(700px 220px at 0% 40%, rgba(96,165,250,.20), transparent 60%),
        radial-gradient(700px 220px at 100% 40%, rgba(167,139,250,.16), transparent 60%);
      pointer-events:none;
    }
    .hero > *{ position:relative; }

    h1{
      margin: 0 0 8px;
      font-size: clamp(32px, 3.4vw, 46px);
      letter-spacing:-.02em;
    }
    .tagline{
      margin: 0 auto 14px;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(15px, 1.5vw, 18px);
      line-height: 1.6;
    }

    .pillrow{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top: 16px;
      margin-bottom: 18px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(15,29,53,.55);
      backdrop-filter: blur(10px);
      color: var(--text);
      font-size: 13.5px;
    }
    .pill svg{ opacity:.92; }

    .cta{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top: 10px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(15,29,53,.65);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      min-width: 210px;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(94,234,212,.35);
      background: rgba(15,29,53,.82);
      text-decoration:none;
    }
    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(94,234,212,.90));
      border-color: rgba(255,255,255,.12);
      color:#051225;
    }
    .btn.primary:hover{
      border-color: rgba(255,255,255,.18);
      background: linear-gradient(135deg, rgba(96,165,250,1), rgba(94,234,212,1));
    }

    /* Section styling */
    .section{
      margin-top: 26px;
      padding: 24px 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(15,29,53,.40);
      box-shadow: 0 12px 26px rgba(0,0,0,.22);
    }
    .section h2{
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing:-.01em;
    }
    .section p{
      margin: 0 auto;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.7;
    }

    .divider{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin: 18px 0 8px;
      opacity:.9;
    }
    .divider .line{
      height:1px;
      width: 160px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
    }
    .divider .dot{
      width:8px; height:8px;
      border-radius:50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 3px rgba(94,234,212,.12);
    }

    /* Grid Cards */
    .grid{
      display:grid;
      gap: 14px;
      grid-template-columns: repeat(12, 1fr);
      margin-top: 14px;
    }
    .card{
      grid-column: span 6;
      padding: 18px 16px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.09);
      background: linear-gradient(180deg, rgba(12,22,42,.85), rgba(12,22,42,.55));
      box-shadow: 0 12px 28px rgba(0,0,0,.25);
      text-align:center;
    }
    .card h3{
      margin: 10px 0 8px;
      font-size: 18px;
    }
    .card p{
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.65;
      max-width: 420px;
      font-size: 14.5px;
    }
    .card .icon{
      width: 44px; height: 44px;
      margin: 0 auto;
      border-radius: 14px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
    }

    .bullets{
      margin: 12px auto 0;
      padding: 0;
      list-style: none;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap: 8px 10px;
      max-width: 760px;
    }
    .bullets li{
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(15,29,53,.35);
      font-size: 13px;
      color: var(--text);
      opacity:.95;
    }

    /* Footer contact */
    .contact{
      margin-top: 26px;
      padding: 22px 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
    }
    .contact h2{ margin:0 0 10px; }
    .contact .list{
      margin: 12px auto 0;
      padding: 0;
      list-style:none;
      max-width: 720px;
      display:grid;
      gap: 10px;
    }
    .contact .item{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(15,29,53,.40);
    }
    .contact .label{
      color: var(--muted);
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 820px){
      .card{ grid-column: span 12; }
      .divider .line{ width: 110px; }
      .btn{ min-width: 240px; }
    }
  </style>
</head>
