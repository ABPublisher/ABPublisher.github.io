<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Scanner App – Redirecting</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Automatic redirect -->
<meta http-equiv="refresh" content="2; url=https://play.google.com/store/apps/details?id=com.abpublisher.scanner">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f6f8fa;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    text-align:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    max-width:420px;
}

h1{
    margin-top:0;
    font-size:22px;
    color:#222;
}

p{
    color:#555;
    margin-bottom:25px;
}

.badge img{
    height:60px;
}

.small{
    margin-top:18px;
    font-size:13px;
    color:#777;
}
</style>

<script>
setTimeout(function(){
   window.location.href="https://play.google.com/store/apps/details?id=com.abpublisher.scanner";
},2000);
</script>

</head>

<body>

<div class="container">

<h1>Scanner</h1>

<p>You are being redirected to Google Play.</p>

<a class="badge" href="https://play.google.com/store/apps/details?id=com.abpublisher.scanner">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
</a>

<div class="small">
If you are not redirected automatically, click the button above.
</div>

</div>

</body>
</html>
